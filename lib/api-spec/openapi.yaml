openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SEAT-MSPTM 2027 Symposium API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: speakers
    description: Speaker operations
  - name: sessions
    description: Programme session operations
  - name: sponsors
    description: Sponsor operations
  - name: registrations
    description: Registration operations
  - name: registration-categories
    description: Registration category and pricing management
  - name: announcements
    description: Announcement operations
  - name: stats
    description: Summary statistics
  - name: storage
    description: Object storage upload and serving endpoints
  - name: users
    description: User management (admin)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new attendee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
    patch:
      operationId: updateMe
      tags: [auth]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /speakers:
    get:
      operationId: getSpeakers
      tags: [speakers]
      summary: List all speakers
      responses:
        "200":
          description: List of speakers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Speaker"
    post:
      operationId: createSpeaker
      tags: [speakers]
      summary: Create a speaker (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpeakerInput"
      responses:
        "201":
          description: Speaker created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Speaker"

  /speakers/{id}:
    get:
      operationId: getSpeaker
      tags: [speakers]
      summary: Get a speaker by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Speaker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Speaker"
        "404":
          description: Not found
    put:
      operationId: updateSpeaker
      tags: [speakers]
      summary: Update a speaker (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpeakerInput"
      responses:
        "200":
          description: Updated speaker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Speaker"
    delete:
      operationId: deleteSpeaker
      tags: [speakers]
      summary: Delete a speaker (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /sessions:
    get:
      operationId: getSessions
      tags: [sessions]
      summary: List all programme sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a session (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionInput"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/saved:
    get:
      operationId: getSavedSessions
      tags: [sessions]
      summary: Get current user's saved sessions
      responses:
        "200":
          description: List of saved session IDs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
        "401":
          description: Unauthorized

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get a session by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Not found
    put:
      operationId: updateSession
      tags: [sessions]
      summary: Update a session (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
    delete:
      operationId: deleteSession
      tags: [sessions]
      summary: Delete a session (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /sessions/{id}/save:
    post:
      operationId: saveSession
      tags: [sessions]
      summary: Save a session to personal schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Session saved
        "401":
          description: Unauthorized
    delete:
      operationId: unsaveSession
      tags: [sessions]
      summary: Remove session from personal schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed
        "401":
          description: Unauthorized

  /sponsors:
    get:
      operationId: getSponsors
      tags: [sponsors]
      summary: List all sponsors
      responses:
        "200":
          description: List of sponsors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sponsor"
    post:
      operationId: createSponsor
      tags: [sponsors]
      summary: Create a sponsor (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SponsorInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sponsor"

  /sponsors/{id}:
    put:
      operationId: updateSponsor
      tags: [sponsors]
      summary: Update a sponsor (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SponsorInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sponsor"
    delete:
      operationId: deleteSponsor
      tags: [sponsors]
      summary: Delete a sponsor (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /registrations:
    post:
      operationId: createRegistration
      tags: [registrations]
      summary: Register as a delegate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationInput"
      responses:
        "201":
          description: Registration created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Registration"
    get:
      operationId: getRegistrations
      tags: [registrations]
      summary: List all registrations (admin)
      responses:
        "200":
          description: List of registrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Registration"

  /registrations/me:
    get:
      operationId: getMyRegistration
      tags: [registrations]
      summary: Get current user's registration
      responses:
        "200":
          description: My registration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Registration"
        "404":
          description: No registration found

  /registrations/me/invoice:
    get:
      operationId: getMyInvoice
      tags: [registrations]
      summary: Get current user's invoice
      responses:
        "200":
          description: Invoice details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: No registration found

  /registrations/{id}:
    get:
      operationId: getRegistration
      tags: [registrations]
      summary: Get a registration by ID (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Registration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Registration"
        "404":
          description: Not found
    patch:
      operationId: updateRegistration
      tags: [registrations]
      summary: Update registration status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Registration"

  /admin/registrations:
    post:
      operationId: adminCreateRegistration
      tags: [registrations]
      summary: Manually register a delegate (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminRegistrationInput"
      responses:
        "201":
          description: Registration created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Registration"
        "400":
          description: Missing required fields
        "409":
          description: Email already has a registration

  /registrations/{id}/remind:
    post:
      operationId: sendPaymentReminder
      tags: [registrations]
      summary: Log a payment reminder sent to a delegate (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reminder logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReminderResponse"
        "404":
          description: Not found

  /abstracts:
    get:
      operationId: getAbstracts
      tags: [registrations]
      summary: List all abstracts (admin) or current user's abstracts
      responses:
        "200":
          description: List of abstracts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Abstract"
    post:
      operationId: createAbstract
      tags: [registrations]
      summary: Submit an abstract
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AbstractInput"
      responses:
        "201":
          description: Abstract submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Abstract"

  /abstracts/{id}:
    get:
      operationId: getAbstract
      tags: [registrations]
      summary: Get an abstract by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Abstract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Abstract"
        "404":
          description: Not found
    patch:
      operationId: updateAbstract
      tags: [registrations]
      summary: Update abstract status (admin) or edit own abstract
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AbstractUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Abstract"

  /abstracts/{id}/history:
    get:
      operationId: getAbstractHistory
      tags: [registrations]
      summary: Get status history for an abstract (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Status history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AbstractHistoryItem"

  /users:
    get:
      operationId: getUsers
      tags: [users]
      summary: List all users (admin)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user role (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRoleUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found

  /announcements:
    get:
      operationId: getAnnouncements
      tags: [announcements]
      summary: List all announcements
      responses:
        "200":
          description: List of announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Create an announcement (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /announcements/{id}:
    patch:
      operationId: updateAnnouncement
      tags: [announcements]
      summary: Update an announcement (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete an announcement (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [stats]
      summary: Get event settings / CMS content (admin)
      responses:
        "200":
          description: Settings key-value map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsMap"
    put:
      operationId: putSettings
      tags: [stats]
      summary: Update event settings (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsMap"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsMap"

  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [stats]
      summary: Get event summary statistics (admin)
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

  /stats/registrations-by-month:
    get:
      operationId: getRegistrationsByMonth
      tags: [stats]
      summary: Get registration counts grouped by year-month (admin)
      responses:
        "200":
          description: Monthly registration counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyRegistrationCount"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RegisterInput:
      type: object
      required: [email, password, firstName, lastName, institution, country, category]
      properties:
        email:
          type: string
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        institution:
          type: string
        country:
          type: string
        category:
          type: string
          description: Slug of the registration category (from /registration-categories)

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, email, firstName, lastName, role, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        institution:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        role:
          type: string
          enum: [attendee, admin]
        createdAt:
          type: string

    ProfileUpdate:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        institution:
          type: string
        country:
          type: string

    Speaker:
      type: object
      required: [id, name, country, topic]
      properties:
        id:
          type: integer
        name:
          type: string
        country:
          type: string
        institution:
          type: ["string", "null"]
        topic:
          type: string
        bio:
          type: ["string", "null"]
        photoUrl:
          type: ["string", "null"]
        initials:
          type: string

    SpeakerInput:
      type: object
      required: [name, country, topic]
      properties:
        name:
          type: string
        country:
          type: string
        institution:
          type: string
        topic:
          type: string
        bio:
          type: string
        photoUrl:
          type: string

    Session:
      type: object
      required: [id, title, day, startTime, sessionType]
      properties:
        id:
          type: integer
        title:
          type: string
        day:
          type: integer
        startTime:
          type: string
        endTime:
          type: ["string", "null"]
        room:
          type: ["string", "null"]
        sessionType:
          type: string
          enum: [keynote, panel, workshop, oral, poster, opening, closing]
        description:
          type: ["string", "null"]
        speakerId:
          type: ["integer", "null"]
        speakerName:
          type: ["string", "null"]

    SessionInput:
      type: object
      required: [title, day, startTime, sessionType]
      properties:
        title:
          type: string
        day:
          type: integer
        startTime:
          type: string
        endTime:
          type: string
        room:
          type: string
        sessionType:
          type: string
          enum: [keynote, panel, workshop, oral, poster, opening, closing]
        description:
          type: string
        speakerId:
          type: integer

    Sponsor:
      type: object
      required: [id, name, tier]
      properties:
        id:
          type: integer
        name:
          type: string
        tier:
          type: string
          enum: [platinum, gold, silver, bronze]
        logoUrl:
          type: ["string", "null"]
        website:
          type: ["string", "null"]

    SponsorInput:
      type: object
      required: [name, tier]
      properties:
        name:
          type: string
        tier:
          type: string
          enum: [platinum, gold, silver, bronze]
        logoUrl:
          type: string
        website:
          type: string

    Registration:
      type: object
      required: [id, userId, category, paymentStatus, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        institution:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        category:
          type: string
        paymentStatus:
          type: string
          enum: [pending, paid, overdue, waived]
        paymentAmount:
          type: ["number", "null"]
        registrationCode:
          type: string
        createdAt:
          type: string

    RegistrationInput:
      type: object
      required: [category]
      properties:
        category:
          type: string
        dietaryRequirements:
          type: string
        specialNeeds:
          type: string

    AdminRegistrationInput:
      type: object
      required: [firstName, lastName, email, category]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        institution:
          type: string
        country:
          type: string
        category:
          type: string
        paymentStatus:
          type: string
          enum: [pending, paid, overdue, waived]
        paymentAmount:
          type: number
        dietaryRequirements:
          type: string
        specialNeeds:
          type: string

    RegistrationUpdate:
      type: object
      properties:
        paymentStatus:
          type: string
          enum: [pending, paid, overdue, waived]
        paymentAmount:
          type: number

    Invoice:
      type: object
      required: [invoiceNumber, registrationCode, category, amount, currency, status, issuedAt, delegate]
      properties:
        invoiceNumber:
          type: string
        registrationCode:
          type: string
        category:
          type: string
        amount:
          type: number
        currency:
          type: string
        status:
          type: string
          enum: [pending, paid, overdue, waived]
        issuedAt:
          type: string
        paidAt:
          type: ["string", "null"]
        delegate:
          $ref: "#/components/schemas/InvoiceDelegate"

    InvoiceDelegate:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
        email:
          type: string
        institution:
          type: ["string", "null"]
